name: Refresh Data

on:
  schedule:
    # 7 AM ET every morning (11:00 UTC, accounts for EDT offset)
    - cron: '0 11 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit updated JSON files back

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic youtube-transcript-api feedparser

      - name: Fetch meeting data
        run: python3 fetch_data.py

      - name: Refresh AI summaries (new videos only)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 summarize.py --max 10

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add meetings.json calendar.json summaries.json
          git diff --staged --quiet || git commit -m "chore: refresh data $(date -u '+%Y-%m-%d')"
          git push
